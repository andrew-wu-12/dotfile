# Install plugins under XDG so everything lives in ~/.config/tmux/plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

set -g prefix ^B
set -g base-index 1
set -g renumber-windows on
set -g status-position top
setw -g mode-keys vi

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "screen-256color"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding
set -g @vim_navigator_prefix_mapping_clear_screen ""
# Load catppuccin (only if TPM has installed it; the repo 'catppuccin/tmux'
# lands in a dir named 'tmux'). Guarded so a fresh machine doesn't error.
if-shell "test -e ~/.config/tmux/plugins/tmux/catppuccin.tmux" \
  "run ~/.config/tmux/plugins/tmux/catppuccin.tmux"

bind C-o popup -E -d "#{pane_current_path}" -w 90% -h 90% "opencode"
bind C-g popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazygit"
# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Auto-install TPM on a fresh machine, then install all @plugin entries.
if-shell "test ! -d ~/.config/tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
